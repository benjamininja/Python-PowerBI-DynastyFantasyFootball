repos:
  - repo: local
    hooks:
      - id: check-sources
        name: validate docs/sources.yml manifest
        entry: ./.venv/Scripts/python.exe scripts/check_sources.py
        language: system
        pass_filenames: false
        files: ^(docs/sources\.yml|docs/SOURCES\.md|notebooks/.*)$
  - repo: https://github.com/benjamininja/project-memory-template
    rev: 389879e52426d30027e64b130e4350e468e0bbbf
    hooks:
      - id: check-in-hygiene
