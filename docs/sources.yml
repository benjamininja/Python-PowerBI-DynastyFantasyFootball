# sources.yml — machine-readable external-input manifest (SSOT).
#
# This file is the single source of truth for every place data crosses into the
# repo from outside. SOURCES.md renders its tables FROM this file — do not
# hand-edit the generated table regions in SOURCES.md; edit here and run:
#     .\run.ps1 scripts/check_sources.py --render
#
# Validation (see scripts/check_sources.py):
#   - schema check (all sources)            : required fields, unique id, valid status
#   - notebook-exists + token-match (live)  : each feeds[].notebook exists and
#                                             contains >=1 match token (OR)
#   - reverse-drift (WARN)                  : notebook external hosts not registered
#                                             here and not in ignore_hosts
#
# Field notes:
#   id       : stable slug, primary key (never rendered)
#   name     : display -> SOURCES.md "Source" column
#   status   : live | planned   (lint enforces notebook+token on live only)
#   locator  : human URL/locator for the rendered table
#   auth     : METHOD only — never a token/password/email/key (secrets rule)
#   feeds    : list of {notebook, table}; lint asserts token in EACH notebook
#   match    : token(s) the lint searches for in feed notebooks (case-insensitive
#              substring, OR across the list). Internal — never rendered.

# Hosts that legitimately appear in notebooks but are NOT data sources.
# The reverse-drift check subtracts these (plus registered source hosts).
# Populate when a new non-source host is flagged; keep alphabetized.
ignore_hosts:
  - github.com
  - githubusercontent.com

sources:
